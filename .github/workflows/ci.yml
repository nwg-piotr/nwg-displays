name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          libgtk-3-dev \
          libgdk-pixbuf2.0-dev \
          libcairo2-dev \
          gir1.2-gtk-3.0 \
          gir1.2-gtklayer-3.0 \
          python3-gi \
          python3-gi-cairo

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build installer setuptools wheel

    - name: Build package
      run: |
        python -m build --wheel --no-isolation

    - name: Verify wheel
      run: |
        ls -la dist/
        python -m installer dist/*.whl --destdir ./test-install

    - name: Check package structure
      run: |
        echo "Checking installed files..."
        find ./test-install -type f | head -20

  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install linting tools
      run: |
        pip install flake8 pylint

    - name: Run flake8
      run: |
        flake8 nwg_displays/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 nwg_displays/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run pylint
      run: |
        pylint nwg_displays/ --errors-only || true

  check-scripts:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check install.sh syntax
      run: |
        bash -n install.sh
        echo "install.sh syntax OK"

    - name: Verify install.sh is executable
      run: |
        test -x install.sh && echo "install.sh is executable" || echo "install.sh is not executable"
